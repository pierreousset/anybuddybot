# ─── Centre ───────────────────────────────────────────────────────────────
center_id: tennis-jardin-du-luxembourg

# ─── Que cibler ───────────────────────────────────────────────────────────
targets:
  activity: tennis
  # date: 2026-06-20        # forcer une date précise (sinon = prochain samedi)
  weekdays: [5]             # 0=lun 1=mar 2=mer 3=jeu 4=ven 5=sam 6=dim ; [] = tous
  time_from: "09:00"        # heure de début souhaitée (min) — créneau du matin
  time_to:   "12:00"        # heure de début souhaitée (max)
  duration: null            # null = n'importe quelle durée (30/60/90 min)
  party_size: null          # ex 4 ; null = défaut du service
  court_keywords: []        # ex ["court 1", "central"] ; ordre = préférence
  max_price_eur: null       # ex 30 ; null = pas de limite

# ─── Stratégie de sniping ─────────────────────────────────────────────────
sniping:
  target_weekday: 5         # vise le PROCHAIN samedi (lancé le lundi → samedi suivant)
  # open_days_ahead: 7      # ignoré si target_weekday est défini
  prefire_seconds: 3        # commencer à marteler N s avant l'ouverture
  burst_hz: 4               # requêtes/seconde pendant le burst
  burst_duration_seconds: 120
  watch_poll_seconds: 60    # cadence du mode `watch` (annulations)

# ─── Réservation ──────────────────────────────────────────────────────────
auto_book: false            # true = tente la résa auto ; false = notifie seulement
booking_method: notify      # "notify" (alerte seule) | "browser" (Playwright : résa+paiement)
dry_run: true               # browser+dry_run : ouvre le paiement mais NE paie PAS
headless: false             # navigateur visible (recommandé au début) ou non
locale: fr

# Mode "browser" : connecte-toi une fois via
#   python -m anybuddy.booker_browser login
# La session est sauvegardée dans .pw-profile/ et réutilisée. Le paiement
# utilise ta carte enregistrée + coche les CGV automatiquement.
# Auth Anybuddy = cookie "AuthToken". Colle juste la VALEUR du token ici ;
# le bot l'envoie automatiquement en cookie AuthToken=<token>.
# ⚠️ Token Firebase = expire ~1h → ok pour tester, PAS pour le run overnight
# (utilise alors booking_method: browser, qui régénère la session).
auth_token: ""
auth_cookie_name: "AuthToken"
auth_headers: {}            # en-têtes additionnels si besoin (rare)

user:
  first_name: ""
  last_name: ""
  email: ""

# ─── Notifications (optionnel) ────────────────────────────────────────────
notifications:
  telegram:
    bot_token: ""           # créer un bot via @BotFather
    chat_id: ""             # ton chat id (via @userinfobot)
  email:
    smtp_host: ""           # ex smtp.gmail.com
    smtp_port: 587
    username: ""
    password: ""            # mot de passe d'application
    from: ""
    to: ""
